<!doctype html>
<!--
  Mini-vLLM Live Visualiser.

  Single file. No build pipeline. Plain JS + D3 from CDN. The page connects
  to ws://<host>/events on load and reduces every incoming event into one
  state object, then re-renders four panels: header (connection + throughput),
  active requests, KV cache grid, event log.

  Comment density is intentional -- this file is meant to be read in
  interviews to defend the architecture choices.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Mini-vLLM Live Visualiser</title>
  <!-- Inline SVG favicon: rounded square in the project accent color with
       a monospace "M" mark. Data-URI so we don't need a separate file. -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' rx='3' fill='%2300d4ff'/><text x='8' y='12' text-anchor='middle' font-family='monospace' font-weight='700' font-size='11' fill='%23001017'>M</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    /* ---- Palette ---------------------------------------------------------
       Dark "systems console" aesthetic. Block colors come from request_id
       hashing at runtime so they're consistent per request across panels. */
    :root {
      --bg:        #0a0a0a;
      --panel:     #111111;
      --border:    #1f1f1f;
      --border-2:  #2a2a2a;
      --text:      #e6e6e6;
      --text-dim:  #888888;
      --text-mute: #555555;
      --accent:    #00d4ff;
      --accent-2:  #007a99;
      --warn:      #ffaa00;
      --ok:        #4caf50;
      --bad:       #e74c3c;
      --block-free: #1a1a1a;
      --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
      --sans: 'Inter', system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      line-height: 1.4;
    }

    /* ---- Header ---------------------------------------------------------- */
    header {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #0d0d0d 0%, #080808 100%);
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      margin: 0;
      letter-spacing: 0.02em;
    }
    h1 .accent { color: var(--accent); }

    .conn {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }
    .conn .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--bad);
      box-shadow: 0 0 0 0 transparent;
    }
    .conn.connected .dot {
      background: var(--ok);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.4); }
      50%      { box-shadow: 0 0 0 6px rgba(76, 175, 80, 0); }
    }

    .stat {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .stat .v {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 600;
      color: var(--accent);
    }
    .stat .l {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ---- Submit form ---------------------------------------------------- */
    .submit-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
    }
    .submit-bar input[type=text] {
      flex: 1;
      background: #080808;
      border: 1px solid var(--border-2);
      color: var(--text);
      padding: 8px 12px;
      font-family: var(--mono);
      font-size: 13px;
      border-radius: 3px;
      outline: none;
      transition: border-color 0.15s;
    }
    .submit-bar input[type=text]:focus { border-color: var(--accent-2); }
    .submit-bar input[type=number] {
      width: 70px;
      background: #080808;
      border: 1px solid var(--border-2);
      color: var(--text);
      padding: 8px 10px;
      font-family: var(--mono);
      font-size: 13px;
      border-radius: 3px;
      outline: none;
    }
    .submit-bar button {
      background: var(--accent);
      color: #001017;
      border: none;
      padding: 8px 18px;
      font-family: var(--sans);
      font-weight: 600;
      font-size: 12px;
      border-radius: 3px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      transition: background 0.15s;
    }
    .submit-bar button:hover { background: #5cdeff; }
    .submit-bar button:disabled { background: var(--border-2); color: var(--text-mute); cursor: not-allowed; }

    .chip {
      font-family: var(--mono);
      font-size: 11px;
      padding: 4px 10px;
      border: 1px solid var(--border-2);
      border-radius: 12px;
      color: var(--text-dim);
    }
    .chip .v { color: var(--accent); font-weight: 600; }

    /* ---- Panels --------------------------------------------------------- */
    main {
      display: grid;
      grid-template-columns: 50% 50%;
      gap: 1px;
      background: var(--border);
    }
    .panel {
      background: var(--panel);
      padding: 16px 20px;
      min-height: 50vh;
    }
    .panel h2 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin: 0 0 12px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ---- Request rows ---------------------------------------------------
       Compact single-line rows so 8 active requests fit without scrolling.
       Layout: id | status badge | single-line preview (last ~40 chars of
       generated text, prompt as fallback before any tokens) | token count. */
    .request-row {
      display: grid;
      grid-template-columns: 80px 72px 1fr auto;
      gap: 10px;
      padding: 6px 10px;
      border: 1px solid var(--border-2);
      border-radius: 3px;
      margin-bottom: 4px;
      font-family: var(--mono);
      font-size: 12px;
      transition: background 0.4s, border-color 0.4s;
      align-items: center;
      min-height: 36px;
    }
    .request-row.flash {
      background: rgba(0, 212, 255, 0.06);
      border-color: var(--accent-2);
    }
    .req-id {
      font-weight: 600;
      letter-spacing: -0.02em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .req-status {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 2px;
      text-align: center;
      letter-spacing: 0.05em;
    }
    .status-WAITING { background: #2a2418; color: var(--warn); }
    .status-PREFILL { background: #2a1a08; color: var(--warn); }
    .status-DECODE  { background: #003345; color: var(--accent); }
    .status-DONE    { background: #0f2a14; color: var(--ok); }

    .req-preview {
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 11px;
    }
    .req-preview.empty { color: var(--text-dim); }
    .req-tokens {
      font-size: 10px;
      color: var(--text-mute);
      white-space: nowrap;
    }

    .empty {
      color: var(--text-mute);
      font-style: italic;
      padding: 20px 0;
      text-align: center;
    }

    /* ---- Cache grid ----------------------------------------------------- */
    .pool-summary {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      font-family: var(--mono);
      font-size: 12px;
    }
    .pool-bar {
      flex: 1;
      height: 6px;
      background: var(--block-free);
      border-radius: 3px;
      overflow: hidden;
    }
    .pool-bar .fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.3s;
    }
    .pool-text { color: var(--text-dim); }
    .pool-text .v { color: var(--text); font-weight: 600; }

    #cache-grid {
      display: block;
    }
    rect.block {
      cursor: pointer;
    }
    rect.block:hover {
      stroke: var(--accent) !important;
      stroke-width: 2 !important;
    }

    .tooltip {
      position: fixed;
      pointer-events: none;
      background: #000;
      border: 1px solid var(--accent-2);
      padding: 6px 10px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text);
      border-radius: 3px;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 100;
    }
    .tooltip.show { opacity: 1; }
    .tooltip .label { color: var(--text-dim); }

    /* ---- Event log ------------------------------------------------------ */
    .log-panel {
      background: var(--panel);
      border-top: 1px solid var(--border);
    }
    .log-panel summary {
      padding: 10px 20px;
      cursor: pointer;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .log-panel summary::-webkit-details-marker { display: none; }
    .log-panel summary::before {
      content: '▸';
      display: inline-block;
      margin-right: 8px;
      transition: transform 0.15s;
      color: var(--text-mute);
    }
    .log-panel[open] summary::before { transform: rotate(90deg); }
    .log-panel select {
      background: #080808;
      border: 1px solid var(--border-2);
      color: var(--text);
      padding: 4px 8px;
      font-family: var(--mono);
      font-size: 11px;
      border-radius: 3px;
    }
    .log-body {
      max-height: 35vh;
      overflow-y: auto;
      padding: 0 20px 16px 20px;
      font-family: var(--mono);
      font-size: 11px;
    }
    .event-row {
      display: grid;
      grid-template-columns: 80px 160px 1fr;
      gap: 12px;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
    }
    .event-time { color: var(--text-mute); }
    .event-type {
      color: var(--text);
      font-weight: 500;
    }
    .event-type.request_admitted   { color: var(--ok); }
    .event-type.request_finished   { color: var(--warn); }
    .event-type.decode_step        { color: var(--accent); }
    .event-type.pool_state         { color: var(--text-mute); }
    .event-type.block_allocated    { color: #c98552; }
    .event-type.block_freed        { color: #6cbe6c; }
    .event-type.request_waiting    { color: var(--bad); }
    .event-payload { color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ---- Footer note ---------------------------------------------------- */
    footer {
      padding: 12px 20px;
      color: var(--text-mute);
      font-family: var(--mono);
      font-size: 10px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <header>
    <h1>Mini-<span class="accent">vLLM</span> Live Visualiser</h1>
    <div class="conn" id="conn">
      <div class="dot"></div>
      <span id="conn-text">disconnected</span>
    </div>
    <div style="flex: 1"></div>
    <div class="stat">
      <span class="v" id="throughput">0.0</span>
      <span class="l">tokens / sec  (5s avg)</span>
    </div>
    <div class="chip"><span class="v" id="active-count">0</span> active</div>
  </header>

  <div class="submit-bar">
    <input type="text" id="prompt" placeholder="Enter a prompt..." value="The capital of France is">
    <input type="number" id="max-tokens" value="30" min="1" max="200">
    <button id="submit">Submit</button>
  </div>

  <main>
    <section class="panel">
      <h2><span>Active Requests (<span id="active-count-2">0</span>)</span></h2>
      <div id="request-list"></div>
    </section>

    <section class="panel">
      <h2>KV Cache State</h2>
      <div class="pool-summary">
        <span class="pool-text"><span class="v" id="pool-used">0</span> / <span class="v" id="pool-total">0</span> blocks used (<span id="pool-pct">0</span>%)</span>
        <div class="pool-bar"><div class="fill" id="pool-fill" style="width: 0%"></div></div>
      </div>
      <svg id="cache-grid" width="100%" height="320"></svg>
    </section>
  </main>

  <details class="log-panel" open>
    <summary>
      <span>Event Log</span>
      <select id="event-filter">
        <option value="">all events</option>
        <option value="request_admitted">request_admitted</option>
        <option value="request_waiting">request_waiting</option>
        <option value="prefill_started">prefill_started</option>
        <option value="prefill_done">prefill_done</option>
        <option value="decode_step">decode_step</option>
        <option value="block_allocated">block_allocated</option>
        <option value="block_freed">block_freed</option>
        <option value="request_finished">request_finished</option>
        <option value="pool_state">pool_state</option>
      </select>
    </summary>
    <div class="log-body" id="log"></div>
  </details>

  <footer>websocket: <span id="ws-url">/events</span></footer>

  <div class="tooltip" id="tooltip"></div>

<script>
/* =============================================================================
   STATE
   ===========================================================================
   One mutable object, fields named after what they hold. Reducer mutates,
   render() reads. No diffing library: the request list is small, the event
   log is capped, the cache grid uses D3's keyed data-join.
   ============================================================================= */

const state = {
  connected: false,
  requests: {},          // request_id -> {prompt, status, tokens, finishedAt}
  blocks: {},            // physical_idx -> {request_id, logical_idx}
  pool: { free_blocks: 0, used_blocks: 0, total_blocks: 0 },
  recent: [],            // last 50 events
  throughput: [],        // [{t: epoch_ms, n: tokens}]
  eventFilter: '',
  flashing: new Set(),   // request_ids currently flashing (animation)
};

const MAX_LOG = 50;
const THROUGHPUT_WINDOW_MS = 5000;
const FLASH_MS = 350;

/* =============================================================================
   COLOR PER REQUEST
   ============================================================================
   Hash a request_id to a deterministic HSL hue. Same id -> same color across
   panels (request row badge, cache grid blocks, event log). Saturation/lightness
   chosen so colors stay readable on the dark background.
   ============================================================================ */
function colorFor(requestId) {
  if (!requestId) return 'var(--block-free)';
  let h = 0;
  for (let i = 0; i < requestId.length; i++) {
    h = (h * 31 + requestId.charCodeAt(i)) >>> 0;
  }
  const hue = h % 360;
  return `hsl(${hue}, 65%, 55%)`;
}

/* =============================================================================
   REDUCER
   ============================================================================
   One case per event type. Mutates `state` in place. The render call at the
   end is the single re-paint per event.
   ============================================================================ */
function reduce(ev) {
  const p = ev.payload;
  switch (ev.event_type) {
    case 'request_admitted': {
      state.requests[p.request_id] = state.requests[p.request_id] || {};
      Object.assign(state.requests[p.request_id], {
        request_id: p.request_id,
        prompt: p.prompt || '',
        prompt_len: p.prompt_len,
        status: 'PREFILL',
        tokens: state.requests[p.request_id]?.tokens || [],
      });
      break;
    }
    case 'request_waiting': {
      const r = state.requests[p.request_id] || { request_id: p.request_id, tokens: [] };
      r.status = 'WAITING';
      r.reason = p.reason;
      state.requests[p.request_id] = r;
      break;
    }
    case 'prefill_started': {
      const r = state.requests[p.request_id];
      if (r) r.status = 'PREFILL';
      break;
    }
    case 'prefill_done': {
      const r = state.requests[p.request_id];
      if (r) r.status = 'DECODE';
      break;
    }
    case 'decode_step': {
      // One event covers the whole batched decode. Append each row's token
      // to that request, count tokens for throughput, trigger flash anim.
      const now = Date.now();
      state.throughput.push({ t: now, n: p.batch.length });
      for (const row of p.batch) {
        const r = state.requests[row.request_id];
        if (r) {
          r.tokens.push({ id: row.token_id, str: row.token_str });
          r.status = 'DECODE';
          state.flashing.add(row.request_id);
          setTimeout(() => {
            state.flashing.delete(row.request_id);
            renderRequests();
          }, FLASH_MS);
        }
      }
      break;
    }
    case 'block_allocated': {
      state.blocks[p.physical_block_idx] = {
        request_id: p.request_id,
        logical_idx: p.logical_idx,
      };
      break;
    }
    case 'block_freed': {
      delete state.blocks[p.physical_block_idx];
      break;
    }
    case 'request_finished': {
      const r = state.requests[p.request_id];
      if (r) {
        r.status = 'DONE';
        r.reason = p.reason;
        r.finishedAt = Date.now();
      }
      // Schedule removal a few seconds later so the user sees the row settle
      // into DONE before it disappears.
      setTimeout(() => {
        delete state.requests[p.request_id];
        render();
      }, 4000);
      break;
    }
    case 'pool_state': {
      state.pool = { ...p };
      break;
    }
  }

  // Push into the recent log (cap to MAX_LOG entries, newest at index 0).
  state.recent.unshift(ev);
  if (state.recent.length > MAX_LOG) state.recent.length = MAX_LOG;
}

/* =============================================================================
   RENDER
   ============================================================================
   render() is the single top-level paint. Sub-renderers update one panel each
   and are also callable directly (e.g., the flash timeout calls renderRequests
   to remove the flash class without doing a full re-render).
   ============================================================================ */

function render() {
  renderHeader();
  renderRequests();
  renderCacheGrid();
  renderLog();
}

function renderHeader() {
  const conn = document.getElementById('conn');
  conn.classList.toggle('connected', state.connected);
  document.getElementById('conn-text').textContent =
    state.connected ? 'connected' : 'disconnected';

  // Throughput: trim window, sum, divide by window seconds.
  const cutoff = Date.now() - THROUGHPUT_WINDOW_MS;
  while (state.throughput.length && state.throughput[0].t < cutoff) {
    state.throughput.shift();
  }
  const total = state.throughput.reduce((a, b) => a + b.n, 0);
  const tps = (total / (THROUGHPUT_WINDOW_MS / 1000));
  document.getElementById('throughput').textContent = tps.toFixed(1);

  const active = Object.values(state.requests).filter(r => r.status !== 'DONE').length;
  document.getElementById('active-count').textContent = active;
  document.getElementById('active-count-2').textContent = active;
}

function renderRequests() {
  const container = document.getElementById('request-list');
  const reqs = Object.values(state.requests).sort((a, b) =>
    (a.request_id || '').localeCompare(b.request_id || '')
  );
  if (reqs.length === 0) {
    container.innerHTML = '<div class="empty">No active requests. Submit one above.</div>';
    return;
  }
  container.innerHTML = '';
  for (const r of reqs) {
    const row = document.createElement('div');
    row.className = 'request-row' + (state.flashing.has(r.request_id) ? ' flash' : '');
    const shortId = (r.request_id || '').slice(0, 8);
    // SSE streaming, when present, gives us the running text directly.
    // It arrives at per-token granularity (one event per token), faster
    // and lighter-weight than waiting for the WS decode_step batch event.
    // For requests we DIDN'T submit ourselves, no SSE stream exists; fall
    // back to joining the WS-populated tokens array.
    const tokenText = r.streamed_text || (r.tokens || []).map(t => t.str || '').join('');
    // Single-line preview, ~40 chars. Once tokens have been generated we
    // show the TAIL of the output so the newest tokens are always visible
    // (truncate from the front with an ellipsis). Before any tokens we fall
    // back to the prompt, truncated from the end.
    let preview;
    let previewClass = 'req-preview';
    if (tokenText) {
      preview = tokenText.length > 40 ? '…' + tokenText.slice(-39) : tokenText;
    } else {
      const p = r.prompt || '';
      preview = p.length > 40 ? p.slice(0, 39) + '…' : p;
      previewClass += ' empty';
    }
    row.innerHTML = `
      <div class="req-id" style="color: ${colorFor(r.request_id)}">${escapeHtml(shortId)}</div>
      <div class="req-status status-${r.status || 'WAITING'}">${r.status || 'WAITING'}</div>
      <div class="${previewClass}">${escapeHtml(preview)}</div>
      <div class="req-tokens">${(r.tokens || []).length}t</div>
    `;
    container.appendChild(row);
  }
}

/* ---- Cache grid: the D3 piece ---------------------------------------------- */
const CACHE = {
  cols: 8,
  size: 30,
  gap: 6,
};

function renderCacheGrid() {
  const total = state.pool.total_blocks;
  document.getElementById('pool-total').textContent = total;
  document.getElementById('pool-used').textContent = state.pool.used_blocks;
  const pct = total ? Math.round(100 * state.pool.used_blocks / total) : 0;
  document.getElementById('pool-pct').textContent = pct;
  document.getElementById('pool-fill').style.width = pct + '%';

  if (total === 0) return;  // wait for first pool_state

  // Build the flat data array. The D3 join is keyed on idx so existing rects
  // stay in place; only their fill transitions when the owner changes.
  const data = [];
  for (let i = 0; i < total; i++) {
    data.push({ idx: i, owner: state.blocks[i] || null });
  }

  const svg = d3.select('#cache-grid');
  // Resize to fit the grid. Cols fixed; rows derived from total.
  const rows = Math.ceil(total / CACHE.cols);
  const width  = CACHE.cols * (CACHE.size + CACHE.gap) - CACHE.gap;
  const height = rows * (CACHE.size + CACHE.gap) - CACHE.gap;
  svg.attr('viewBox', `0 0 ${width} ${height}`)
     .attr('preserveAspectRatio', 'xMinYMin meet')
     .attr('height', height);

  svg.selectAll('rect.block')
    .data(data, d => d.idx)
    .join(
      enter => enter.append('rect')
        .attr('class', 'block')
        .attr('x', d => (d.idx % CACHE.cols) * (CACHE.size + CACHE.gap))
        .attr('y', d => Math.floor(d.idx / CACHE.cols) * (CACHE.size + CACHE.gap))
        .attr('width', CACHE.size)
        .attr('height', CACHE.size)
        .attr('rx', 3)
        .attr('fill', 'var(--block-free)')
        .attr('stroke', '#262626')
        .attr('stroke-width', 0.5)
        .on('mouseover', (event, d) => showTooltip(event, d))
        .on('mousemove', (event) => moveTooltip(event))
        .on('mouseout', hideTooltip),
      update => update,
      exit => exit.remove(),
    )
    .transition().duration(220)
    .attr('fill', d => d.owner ? colorFor(d.owner.request_id) : 'var(--block-free)')
    .attr('stroke', d => d.owner ? colorFor(d.owner.request_id) : '#262626')
    .attr('stroke-width', d => d.owner ? 1 : 0.5);
}

function showTooltip(event, d) {
  const tt = document.getElementById('tooltip');
  if (d.owner) {
    const shortId = d.owner.request_id.slice(0, 8);
    tt.innerHTML = `
      <div><span class="label">block</span> ${d.idx}</div>
      <div><span class="label">owner</span> ${escapeHtml(shortId)}</div>
      <div><span class="label">logical slot</span> ${d.owner.logical_idx}</div>
    `;
  } else {
    tt.innerHTML = `<div><span class="label">block</span> ${d.idx}  <span class="label">free</span></div>`;
  }
  tt.classList.add('show');
  moveTooltip(event);
}
function moveTooltip(event) {
  const tt = document.getElementById('tooltip');
  tt.style.left = (event.clientX + 12) + 'px';
  tt.style.top  = (event.clientY + 12) + 'px';
}
function hideTooltip() {
  document.getElementById('tooltip').classList.remove('show');
}

/* ---- Event log ------------------------------------------------------------ */
function renderLog() {
  const log = document.getElementById('log');
  const filter = state.eventFilter;
  const events = filter
    ? state.recent.filter(e => e.event_type === filter)
    : state.recent;
  log.innerHTML = events.map(ev => {
    const t = new Date(ev.timestamp * 1000);
    const hms = t.toTimeString().slice(0, 8) + '.' +
      String(t.getMilliseconds()).padStart(3, '0');
    return `
      <div class="event-row">
        <div class="event-time">${hms}</div>
        <div class="event-type ${ev.event_type}">${ev.event_type}</div>
        <div class="event-payload">${escapeHtml(JSON.stringify(ev.payload))}</div>
      </div>
    `;
  }).join('');
}

/* =============================================================================
   WEBSOCKET CONNECTION
   ============================================================================
   Auto-reconnect with exponential backoff capped at 30s. State survives
   across reconnects -- as the new connection delivers events the panels
   re-populate.
   ============================================================================ */

let ws = null;
let reconnectDelay = 1000;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const url = `${proto}://${location.host}/events`;
  document.getElementById('ws-url').textContent = url;
  ws = new WebSocket(url);

  ws.onopen = () => {
    state.connected = true;
    reconnectDelay = 1000;
    render();
  };
  ws.onmessage = (msg) => {
    let ev;
    try { ev = JSON.parse(msg.data); } catch { return; }
    reduce(ev);
    render();
  };
  ws.onclose = () => {
    state.connected = false;
    render();
    setTimeout(connect, reconnectDelay);
    reconnectDelay = Math.min(30000, reconnectDelay * 2);
  };
  ws.onerror = () => {
    // onclose will follow; the reconnect happens there.
  };
}

/* =============================================================================
   SUBMIT FORM
   ============================================================================
   Fire-and-forget POST. The request_admitted event will appear on the WS
   shortly after and the panel updates from there. We don't await the response;
   the actual completion is signalled via request_finished on the event stream.
   ============================================================================ */
/* SSE-streaming submit. Sends a POST to /generate/stream and consumes
   text/event-stream frames line-by-line. Each token frame updates the
   matching request row's preview live; the final `done` frame triggers
   nothing here -- the scheduler's request_finished event on the WS
   already handles row teardown / DONE styling.

   Why not EventSource? EventSource only does GET. We need to POST a
   JSON body, so we drive the stream ourselves via fetch + a
   ReadableStream reader. */
async function submitPrompt() {
  const prompt = document.getElementById('prompt').value.trim();
  const maxTokens = parseInt(document.getElementById('max-tokens').value, 10);
  if (!prompt || !maxTokens) return;

  const btn = document.getElementById('submit');
  btn.disabled = true;
  try {
    const resp = await fetch('/generate/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, max_tokens: maxTokens }),
    });
    if (!resp.ok || !resp.body) {
      console.warn('generate/stream failed', resp.status);
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      // SSE framing: events separated by a blank line. Each event has
      // one or more `data: ...` lines we care about. Split on \n\n.
      let idx;
      while ((idx = buf.indexOf('\n\n')) !== -1) {
        const frame = buf.slice(0, idx);
        buf = buf.slice(idx + 2);
        for (const line of frame.split('\n')) {
          if (!line.startsWith('data: ')) continue;
          let payload;
          try { payload = JSON.parse(line.slice(6)); } catch { continue; }
          handleStreamEvent(payload);
        }
      }
    }
  } catch (e) {
    console.warn('generate/stream error', e);
  } finally {
    btn.disabled = false;
  }
}

/* Live per-token update of the request row's preview. We don't try to
   maintain our own request map -- the WS event stream already populates
   state.requests; we just nudge the preview's `last_token_str` so the
   next render shows the streaming tail. */
function handleStreamEvent(ev) {
  if (ev.done) return;
  const rid = ev.request_id;
  // The WS request_admitted handler creates the row; before that fires
  // we still need somewhere to accumulate the streamed prefix. Create
  // a stub if needed -- the next WS event will fill in status / prompt.
  let r = state.requests[rid];
  if (!r) {
    r = { request_id: rid, status: 'PREFILL', tokens: [] };
    state.requests[rid] = r;
  }
  r.streamed_text = (r.streamed_text || '') + (ev.token_str || '');
  renderRequests();
}

/* ---- Utility -------------------------------------------------------------- */
function escapeHtml(s) {
  return String(s ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;');
}

/* =============================================================================
   BOOT
   ============================================================================ */
document.getElementById('submit').addEventListener('click', submitPrompt);
document.getElementById('prompt').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') submitPrompt();
});
document.getElementById('event-filter').addEventListener('change', (e) => {
  state.eventFilter = e.target.value;
  renderLog();
});

// Initial paint, then open the socket.
render();
connect();

// Smooth-update the throughput value even when no events fire (so the
// 5-second average decays visibly toward zero after a burst).
setInterval(renderHeader, 500);
</script>
</body>
