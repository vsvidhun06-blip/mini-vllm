# Prometheus scrape config for the mini-vLLM observability stack.
#
# Scrapes the mini-vLLM server's /metrics endpoint every 5s. The server runs on
# the HOST (uvicorn :8000); from inside the Prometheus container the host is
# reachable as host.docker.internal (mapped via extra_hosts in the compose file).
# On Linux without Docker Desktop, host-gateway in the compose makes the same
# name resolve to the host gateway IP.

global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: mini-vllm
    metrics_path: /metrics
    static_configs:
      - targets:
          - "host.docker.internal:8000"
        labels:
          service: mini-vllm
